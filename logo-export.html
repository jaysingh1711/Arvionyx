<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arvyonix Logo Export</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0A0F;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 80px;
        }

        /* Icon Only - for favicon / app icon */
        .logo-icon-only {
            width: 512px;
            height: 512px;
            background: #0A0A0F;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 24px;
            position: relative;
        }
        .logo-icon-only i {
            font-size: 280px;
            color: #00D4FF;
            filter: drop-shadow(0 0 40px rgba(0, 212, 255, 0.5));
        }
        .logo-icon-only .label {
            position: absolute;
            bottom: -40px;
            color: rgba(255,255,255,0.4);
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* Full Logo - icon + text */
        .logo-full {
            display: flex;
            align-items: center;
            gap: 24px;
            background: #0A0A0F;
            padding: 60px 80px;
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 24px;
            position: relative;
        }
        .logo-full i {
            font-size: 80px;
            color: #00D4FF;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.5));
        }
        .logo-full span {
            font-family: 'Syne', sans-serif;
            font-size: 72px;
            font-weight: 800;
            color: #F0F4FF;
            letter-spacing: -1px;
        }
        .logo-full .label {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <!-- Icon Only -->
    <div id="icon-only" class="logo-icon-only">
        <i class="fa-solid fa-circle-nodes"></i>
        <div class="label">ICON ONLY (512×512)</div>
    </div>

    <!-- Full Logo -->
    <div id="logo-full" class="logo-full">
        <i class="fa-solid fa-circle-nodes"></i>
        <span>Arvyonix</span>
        <div class="label">FULL LOGO</div>
    </div>
</body>
</html>
